<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Loan Book - Dropbox Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Orbitron:wght@700&display=swap');
        
        :root {
            --primary: #3b82f6;
            --secondary: #6366f1;
            --bg: #020617;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: #f8fafc;
            background-image: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 40%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gradient-text {
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tight gradient-text font-[Orbitron]">PRO LOAN BOOK</h1>
                <p class="text-slate-400 text-sm">Real-time Dropbox Cloud Sync</p>
            </div>
            <div class="flex gap-2">
                <button onclick="saveToDropbox()" class="bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition-all shadow-lg shadow-green-900/20">
                    <i data-lucide="cloud-upload"></i> Save to Dropbox
                </button>
                <button onclick="downloadJSON()" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition-all border border-slate-700">
                    <i data-lucide="download"></i> Export
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8" id="stats-container">
            </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="glass-card p-6 rounded-2xl">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i data-lucide="pie-chart" class="text-blue-400"></i> Allocation
                </h3>
                <canvas id="typeChart" height="200"></canvas>
            </div>
            <div class="glass-card p-6 rounded-2xl">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i data-lucide="trending-up" class="text-indigo-400"></i> Monthly Growth
                </h3>
                <canvas id="growthChart" height="200"></canvas>
            </div>
        </div>

        <div class="glass-card rounded-2xl overflow-hidden">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center">
                <h3 class="text-lg font-semibold">Active Loans</h3>
                <span id="loan-count" class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-xs font-bold">0 Active</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-900/50 text-slate-400 text-xs uppercase">
                        <tr>
                            <th class="px-6 py-4">Borrower</th>
                            <th class="px-6 py-4">Amount</th>
                            <th class="px-6 py-4">Interest</th>
                            <th class="px-6 py-4">Status</th>
                        </tr>
                    </thead>
                    <tbody id="loan-list" class="divide-y divide-slate-800">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const DBX_ACCESS_TOKEN = 'ඔබේ_ACCESS_TOKEN_එක_මෙහි_යොදන්න'; 
        const FILE_PATH = '/loan_data.json';

        let loans = [];
        let typeChart, growthChart;

        // Initialize Lucide Icons
        function initIcons() { lucide.createIcons(); }

        // ============================================================
        // DROPBOX CORE FUNCTIONS
        // ============================================================

        // 1. FETCH FROM DROPBOX
        async function loadFromDropbox() {
            try {
                const response = await fetch('https://content.dropboxapi.com/2/files/download', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${sl.u.AGWTVI3vhC4HGLQIpSqqPBevcMz8nzubunLrpbqXloqhzMHYAuMZQW4Oi23J7AiaOAMm6CBtuxvyqCaSzWsOXIYgdcxiopK89OcOR45Q0QHwBdGnT-JagXpdP4mfRkomu8jfwesYLDhM4hWulhS_wEc5XDMH1eYpkbVW-FJKGlJ43FF3qUJZSx3pMab9Tiak9p-lL5LrmwuvSS2BzERf3htO4mQwTAMoWLOEvyT1yIpEwIab2PVUnQdMGuRWRbij0mCl0xhW6lbNGupAHa4i5lnUd_QgGbLsaf70BakMDYEX1gZG8IuoB2sdcAGTbrLDWeDbJFI810AviTcJVvycOxmm5M15nMvIz9fbMafBOVzVs7PcP5IGc2f9byudBDEoLt_PNmhkNxgWBp_RdRvR4haDo2m1MLqhsQ88nHx720tKVpE9rBByp7lIu6fy5PsqS53uNyVKYkL0d_pRW34UqRlcj_gNHO6YxT9NZvVNvOt5mIxs-G8tqRg0iFQHZ36VPejk6wxZGnuHeFH6aHBVx88NdAPbZ9ujDcdDdbeW3VgQMwNMHoIYPtTnmHUKiPCnshBOCQrZEcKlYcpO0ZR3ZT_rrZ5a67jhS2hN0TnrhO8-XsbWaUXBo0Lst1N-tkd5jobCKSYb1YB2BNIPo4XcCI61npJ8PTMrXvMFMGkT6MmYPLesKw9k8belR9eCvmUHUGUYi6aHKz1u3nDAf-CQ2F22QmCuAHfy0vWGxqyAG-M1o7pIMG54mjhgNTQOrS2dasONAbIbKPIYwDQOsBlKY4ZjBC2uTVJv9pQmYOx94c-yIfD6IYxazms3R-_OJjOC8o3zexnonQGvCXEgqi8Mj42ukJs_evDphxreU0rA12NIjyppmZVjV0IDASEqw0ZXt530de47MBXgq6MPhqIe52-hQnVZGwBSn_81HKAMM6kINA0Uv0vWqOVsbyWF-4mojcai1sg_Wk2UrsWDV4fV1VOYZkLiZ4vaVUgE2PJsUg6nVjIM-DST93pASTM01lts8pDcXsdB2vpAH5FzR9vLrnqunBt9ZhjrSAto5hQmDkr1Cbuk6liUgYZyphwRy2MDVF-H_i4r9xxr5K9UbjrONig5W5aACodXUfPEg0xxu6VSoNDtr8AUhDxqceD-B6rDT77uL4N_lQ6mzi9kt3LujorRbV6C9mAIZUGQj8-Ip5FLKspjN81C1HLie5sjjAACkNfmCcFOJenG56Bsqo35-Mf-dq6rfBappacX9Qk07bYqm53RtpD8bLVoeuQf7P1QX5KXb-qB6suGplkAxqwxPCrXcpbJx_cVHBjge2736grH-WcMq74b1sLHUMl_yGQfH_JDyRMac-CVoUTUHuZMo1uhUfsP2zMaBXRJA5JEQdnD1uHWU5jnnvIxSSl-VumAts1OVqQFhK0Fpm_h__R3YpVT02w6_d5VIYaZ9v0toz5D2Q}`,
                        'Dropbox-API-Arg': JSON.stringify({ path: FILE_PATH })
                    }
                });

                if (response.ok) {
                    loans = await response.json();
                    localStorage.setItem('loan_data', JSON.stringify(loans));
                    return true;
                }
            } catch (err) {
                console.error("Dropbox Load Error:", err);
            }
            return false;
        }

        // 2. SAVE TO DROPBOX (The Upload Part)
        async function saveToDropbox() {
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            
            try {
                btn.innerHTML = `<i data-lucide="loader-2" class="animate-spin"></i> Saving...`;
                initIcons();

                const response = await fetch('https://content.dropboxapi.com/2/files/upload', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${DBX_ACCESS_TOKEN}`,
                        'Dropbox-API-Arg': JSON.stringify({
                            path: FILE_PATH,
                            mode: 'overwrite',
                            mute: false
                        }),
                        'Content-Type': 'application/octet-stream'
                    },
                    body: JSON.stringify(loans, null, 2)
                });

                if (response.ok) {
                    alert("✅ Data successfully saved to Dropbox!");
                } else {
                    const error = await response.json();
                    throw new Error(error.error_summary);
                }
            } catch (err) {
                alert("❌ Upload failed: " + err.message);
                console.error(err);
            } finally {
                btn.innerHTML = originalText;
                initIcons();
            }
        }

        // ============================================================
        // DATA PROCESSING & UI
        // ============================================================

        function ensureDefaults(loan) {
            loan.amount = parseFloat(loan.amount) || 0;
            loan.interestRate = parseFloat(loan.interestRate) || 0;
            return loan;
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('loan_data');
            if (saved) loans = JSON.parse(saved);
        }

        function updateStats() {
            const totalPrincipal = loans.reduce((sum, l) => sum + l.amount, 0);
            const activeLoans = loans.filter(l => l.status === 'Active').length;
            const avgRate = loans.length ? (loans.reduce((sum, l) => sum + l.interestRate, 0) / loans.length).toFixed(1) : 0;

            const container = document.getElementById('stats-container');
            container.innerHTML = `
                <div class="glass-card p-6 rounded-2xl border-l-4 border-blue-500">
                    <p class="text-slate-400 text-sm mb-1">Total Principal</p>
                    <h2 class="text-2xl font-bold font-[Orbitron]">රු. ${totalPrincipal.toLocaleString()}</h2>
                </div>
                <div class="glass-card p-6 rounded-2xl border-l-4 border-indigo-500">
                    <p class="text-slate-400 text-sm mb-1">Active Portfolio</p>
                    <h2 class="text-2xl font-bold font-[Orbitron]">${activeLoans} Accounts</h2>
                </div>
                <div class="glass-card p-6 rounded-2xl border-l-4 border-emerald-500">
                    <p class="text-slate-400 text-sm mb-1">Avg. Interest Rate</p>
                    <h2 class="text-2xl font-bold font-[Orbitron]">${avgRate}%</h2>
                </div>
            `;
            document.getElementById('loan-count').innerText = `${activeLoans} Active`;
        }

        function renderDashboard() {
            const list = document.getElementById('loan-list');
            list.innerHTML = loans.map(loan => `
                <tr class="hover:bg-white/5 transition-colors">
                    <td class="px-6 py-4">
                        <div class="font-semibold">${loan.borrower}</div>
                        <div class="text-xs text-slate-500">${loan.date || 'N/A'}</div>
                    </td>
                    <td class="px-6 py-4 font-mono">රු. ${loan.amount.toLocaleString()}</td>
                    <td class="px-6 py-4 text-emerald-400">${loan.interestRate}%</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${loan.status === 'Active' ? 'bg-blue-500/10 text-blue-400' : 'bg-slate-700 text-slate-400'}">
                            ${loan.status}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        function initCharts() {
            const ctx1 = document.getElementById('typeChart').getContext('2d');
            typeChart = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: ['Personal', 'Business', 'Emergency'],
                    datasets: [{
                        data: [0, 0, 0],
                        backgroundColor: ['#3b82f6', '#6366f1', '#8b5cf6'],
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } } }
            });

            const ctx2 = document.getElementById('growthChart').getContext('2d');
            growthChart = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Portfolio Value',
                        data: [],
                        borderColor: '#6366f1',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(99, 102, 241, 0.1)'
                    }]
                },
                options: { 
                    scales: { 
                        y: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                        x: { ticks: { color: '#94a3b8' }, grid: { display: false } }
                    }
                }
            });
        }

        function updateCharts() {
            // Update Type Chart
            const types = { Personal: 0, Business: 0, Emergency: 0 };
            loans.forEach(l => { if(types[l.type] !== undefined) types[l.type] += l.amount; });
            typeChart.data.datasets[0].data = Object.values(types);
            typeChart.update();

            // Update Growth Chart
            const monthlyData = {};
            loans.forEach(l => {
                const month = l.date ? l.date.substring(0, 7) : 'Unknown';
                monthlyData[month] = (monthlyData[month] || 0) + l.amount;
            });
            const sortedMonths = Object.keys(monthlyData).sort();
            growthChart.data.labels = sortedMonths;
            growthChart.data.datasets[0].data = sortedMonths.map(m => monthlyData[m]);
            growthChart.update();
        }

        function downloadJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(loans, null, 2));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", `loan_book_${new Date().toISOString().split('T')[0]}.json`);
            dl.click();
        }

        function refreshUI() {
            renderDashboard();
            updateStats();
            updateCharts();
        }

        window.onload = async () => {
            initCharts();
            loadFromLocalStorage();
            loans.forEach(ensureDefaults);
            if (loans.length > 0) refreshUI();
            
            const ok = await loadFromDropbox();
            if (ok) {
                loans.forEach(ensureDefaults);
                refreshUI();
            }
            initIcons();
        };
    </script>
</body>
</html>
